<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#051017" />
      <stop offset="0.55" stop-color="#0A1726" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="nameGradient" x1="90" y1="160" x2="760" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981" />
      <stop offset="0.5" stop-color="#22D3EE" />
      <stop offset="1" stop-color="#818CF8" />
    </linearGradient>
    <radialGradient id="orbA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 90) rotate(31) scale(450 300)">
      <stop stop-color="#34D399" stop-opacity="0.95" />
      <stop offset="1" stop-color="#34D399" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orbB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 420) rotate(-18) scale(360 240)">
      <stop stop-color="#60A5FA" stop-opacity="0.9" />
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orbC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 110) rotate(14) scale(300 200)">
      <stop stop-color="#F472B6" stop-opacity="0.78" />
      <stop offset="1" stop-color="#F472B6" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="white" stroke-opacity="0.06" />
    </pattern>
    <filter id="blurA" x="-100" y="-150" width="1450" height="980" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="55" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <g filter="url(#blurA)">
    <ellipse cx="170" cy="130" rx="430" ry="260" fill="url(#orbA)" />
    <ellipse cx="1050" cy="430" rx="350" ry="220" fill="url(#orbB)" />
    <ellipse cx="910" cy="90" rx="300" ry="180" fill="url(#orbC)" />
  </g>
  <rect width="1200" height="630" fill="url(#grid)" />

  <g>
    <rect x="90" y="92" width="418" height="56" rx="28" fill="#0B2E28" fill-opacity="0.72" />
    <rect x="90.5" y="92.5" width="417" height="55" rx="27.5" stroke="#10B981" stroke-opacity="0.35" />
    <text x="114" y="128" fill="#34D399" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="600">
      System.out.println("Hello, World!");
    </text>
  </g>

  <g>
    <text x="90" y="268" fill="#F8FAFC" font-family="'Segoe UI', Arial, sans-serif" font-size="108" font-weight="800" letter-spacing="-2">
      Kennedy
    </text>
    <text x="90" y="382" fill="url(#nameGradient)" font-family="'Segoe UI', Arial, sans-serif" font-size="108" font-weight="800" letter-spacing="-2">
      Wusunanwa
    </text>
  </g>

  <g>
    <text x="90" y="462" fill="#7DD3FC" font-family="'Consolas', 'Courier New', monospace" font-size="40" font-weight="500">
      &gt; Web Developer • Founder • Tech Enthusiast _
    </text>
  </g>

  <g>
    <rect x="90" y="507" width="380" height="48" rx="24" fill="#0B2B36" fill-opacity="0.76" />
    <rect x="90.5" y="507.5" width="379" height="47" rx="23.5" stroke="#22D3EE" stroke-opacity="0.42" />
    <text x="126" y="539" fill="#A5F3FC" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="600">
      Portfolio • Experience • Projects
    </text>
  </g>
</svg>
