<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="halo" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#047857" stop-opacity="0.16" />
      <stop offset="0.55" stop-color="#047857" stop-opacity="0.04" />
      <stop offset="1" stop-color="#047857" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="halo2" cx="0.1" cy="0.95" r="0.5">
      <stop offset="0" stop-color="#047857" stop-opacity="0.10" />
      <stop offset="1" stop-color="#047857" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#f6f4ec" />
  <rect width="1200" height="630" fill="url(#halo)" />
  <rect width="1200" height="630" fill="url(#halo2)" />

  <!-- top hairline -->
  <line x1="80" y1="108" x2="1120" y2="108" stroke="#14110d" stroke-opacity="0.08" />
  <!-- bottom hairline -->
  <line x1="80" y1="522" x2="1120" y2="522" stroke="#14110d" stroke-opacity="0.08" />

  <!-- eyebrow top -->
  <g>
    <circle cx="80" cy="66" r="6" fill="#059669" />
    <text x="100" y="73" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#4b4843" letter-spacing="3">AVAILABLE  ·  ACCRA  ·  PORTFOLIO 2026</text>
  </g>

  <!-- corner mark -->
  <g>
    <text x="1120" y="73" text-anchor="end" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#8c887f" letter-spacing="4">K · A</text>
  </g>

  <!-- name -->
  <g font-family="'Segoe UI', 'Helvetica Neue', 'Inter Tight', Arial, sans-serif" font-weight="600" letter-spacing="-4">
    <text x="80" y="245" font-size="118" fill="#14110d">Kennedy</text>
    <text x="80" y="365" font-size="118" fill="#8c887f">Wusunanwa</text>
    <text x="80" y="485" font-size="118" fill="#14110d">Abubakar<tspan fill="#059669">.</tspan></text>
  </g>

  <!-- subtext bottom -->
  <g>
    <text x="80" y="568" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="500" fill="#14110d">Full-stack developer &amp; founder</text>
    <text x="80" y="595" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#8c887f" letter-spacing="0.5">Web · Mobile · Desktop  ·  Accra, Ghana</text>
  </g>

  <!-- bottom-right URL -->
  <text x="1120" y="595" text-anchor="end" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#4b4843" letter-spacing="2">KENNEDYABUBAKAR.COM</text>
</svg>
